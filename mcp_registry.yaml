# MCP Server Registry
# Maps logical server names to environment variable keys and descriptions.
#
# To add a new server:
#   1. Add an entry here with a unique name, the env var key, and a description.
#   2. Set the env var in your .env file or deployment config.

mcp_servers:
  # ── Search & Knowledge ──────────────────────────────────────────────
  - name: brave-search
    category: Search
    icon: search
    author: Model Context Protocol
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env_var: BRAVE_API_KEY
    description: "High-quality, private web search for real-time information."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/brave-search"

  - name: wikipedia
    category: Knowledge
    icon: book
    author: Model Context Protocol
    transport: stdio
    command: npx
    args: ["-y", "wikipedia-mcp"]
    description: "Search and retrieve full-text articles from Wikipedia."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/wikipedia"

  # ── Productivity ────────────────────────────────────────────────────
  - name: google-sheets
    category: Productivity
    icon: table
    author: Model Context Protocol
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-google-sheets"]
    description: "Read, write, and manage Google Sheets spreadsheets."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/google-sheets"

  - name: google-drive
    category: Productivity
    icon: hard-drive
    author: Model Context Protocol
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-google-drive"]
    description: "Access and manage files in Google Drive."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/google-drive"

  - name: google-calendar
    category: Productivity
    icon: calendar
    author: Model Context Protocol
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-google-calendar"]
    description: "Full access to Google Calendar events and scheduling."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/google-calendar"

  - name: notion
    category: Productivity
    icon: book-open
    author: Model Context Protocol
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-notion"]
    env_var: NOTION_API_KEY
    description: "Access and manage Notion pages, databases, and blocks."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/notion"

  - name: linear
    category: Productivity
    icon: check-square
    author: Linear
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-linear"]
    env_var: LINEAR_API_KEY
    description: "Manage issues and projects in Linear."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/linear"

  - name: airtable
    category: Productivity
    icon: grid
    author: Model Context Protocol
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-airtable"]
    env_var: AIRTABLE_API_KEY
    description: "Read and write data to Airtable bases."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/airtable"

  # ── Development ─────────────────────────────────────────────────────
  - name: github
    category: Development
    icon: github
    author: Model Context Protocol
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env_var: GITHUB_PERSONAL_ACCESS_TOKEN
    description: "Automate GitHub tasks: PRs, issues, and code search."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/github"

  - name: sentry
    category: Development
    icon: activity
    author: Sentry
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-sentry"]
    env_vars: ["SENTRY_AUTH_TOKEN", "SENTRY_ORG"]
    description: "Retrieve error logs and issues from Sentry."
    doc_url: "https://github.com/modelcontextprotocol/servers/tree/main/src/sentry"

  # ── Infrastructure & Databases ──────────────────────────────────────
  - name: aws-s3
    category: Infrastructure
    icon: box
    author: Model Context Protocol
    transport: stdio
