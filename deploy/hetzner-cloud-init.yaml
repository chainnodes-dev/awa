#cloud-config
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg-agent
  - software-properties-common

runcmd:
  # Install Docker
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sh get-docker.sh
  - systemctl enable docker
  - systemctl start docker

  # Clone repository and start Chainnode stack
  - git clone https://github.com/chainnodes-dev/awa.git /opt/chainnode
  - cd /opt/chainnode
  - cp .env.example .env
  
  # Replace frontend port to 80 for public access if needed
  - sed -i 's/FRONTEND_PORT=5173/FRONTEND_PORT=80/g' .env
  
  # Run production stack
  - docker compose -f docker-compose.prod.yaml up -d
