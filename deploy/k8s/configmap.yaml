apiVersion: v1
kind: ConfigMap
metadata:
  name: asm-config
  namespace: asm
  labels:
    app.kubernetes.io/part-of: asm-platform
data:
  # ── Server ──────────────────────────────────────────────────────────────────
  PORT: "8080"
  CORS_ORIGINS: "https://your-frontend.example.com"
  LOG_LEVEL: "info"

  # ── Execution ────────────────────────────────────────────────────────────────
  # Set to "temporal" when the Temporal cluster is available.
  # Falls back to direct mode automatically if Temporal is unreachable.
  EXECUTOR_MODE: "temporal"

  # ── Temporal ─────────────────────────────────────────────────────────────────
  # Point at your Temporal frontend service, e.g. a managed Temporal Cloud endpoint
  # or a Temporal server deployed in the same cluster.
  TEMPORAL_ADDRESS: "temporal-frontend.temporal.svc.cluster.local:7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "phaxa-workers"

  # ── LLM ──────────────────────────────────────────────────────────────────────
  LLM_PROVIDER: "anthropic"
  DEFAULT_MODEL: "claude-sonnet-4-6"
  # Optional: Ollama local model server (leave blank to disable)
  OLLAMA_URL: ""
  OLLAMA_MODEL: "llama3.2"

  # ── Auth ─────────────────────────────────────────────────────────────────────
  ADMIN_USERNAME: "admin"
