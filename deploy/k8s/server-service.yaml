apiVersion: v1
kind: Service
metadata:
  name: asm-server
  namespace: asm
  labels:
    app: asm-server
    app.kubernetes.io/part-of: asm-platform
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app: asm-server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
