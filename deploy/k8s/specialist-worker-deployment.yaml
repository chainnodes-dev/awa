apiVersion: apps/v1
kind: Deployment
metadata:
  name: asm-specialist-worker
  namespace: asm
  labels:
    app: asm-specialist-worker
    app.kubernetes.io/part-of: asm-platform
    app.kubernetes.io/component: specialist-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asm-specialist-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: asm-specialist-worker
        app.kubernetes.io/part-of: asm-platform
        app.kubernetes.io/component: specialist-worker
    spec:
      terminationGracePeriodSeconds: 60

      containers:
        - name: specialist-worker
          image: asm/specialist-worker:latest
          imagePullPolicy: Always

          envFrom:
            - configMapRef:
                name: asm-config
            - secretRef:
                name: asm-secret

          env:
            - name: EXECUTOR_MODE
              value: temporal

          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 1Gi

          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]

      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
