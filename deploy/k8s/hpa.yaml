apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asm-server
  namespace: asm
  labels:
    app.kubernetes.io/part-of: asm-platform
    app.kubernetes.io/component: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asm-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60       # wait 60 s before scaling up again
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300      # wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# Worker HPA — scales based on CPU; Temporal handles work distribution automatically.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asm-worker
  namespace: asm
  labels:
    app.kubernetes.io/part-of: asm-platform
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asm-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
